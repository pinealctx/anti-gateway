# AntiGateway Configuration Example
# Copy to config.yaml and modify as needed.
#
# Providers are managed dynamically via the Admin API:
#   POST   /admin/providers        — add a provider
#   GET    /admin/providers        — list providers
#   PUT    /admin/providers/:id    — update a provider
#   DELETE /admin/providers/:id    — remove a provider

server:
  host: "0.0.0.0"
  port: 8080
  log_level: "info"   # debug | info | warn | error
  cors_origins: []    # Allowed CORS origins; empty = allow all (dev). Example: ["https://myapp.com"]

auth:
  api_key: ""          # Leave empty to disable API auth; set to require Bearer token
  admin_key: ""        # Separate key for /admin/* endpoints; leave empty = no admin auth

defaults:
  provider: ""         # Fallback provider name (empty = first registered provider)
  model: "claude-opus-4.6"
  lb_strategy: "smart" # weighted | round-robin | least-used | priority | smart

# Multi-tenant mode: per-key auth, rate limiting, usage tracking.
# The SQLite DB is always created (for provider storage); this flag
# controls whether per-key tenant auth is enforced on the API routes.
tenant:
  enabled: false       # true = per-key auth with rate limits; false = single api_key auth
  db_path: "antigateway.db"
