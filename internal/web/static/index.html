<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AntiGateway Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--bg2:#161a24;--bg3:#1e2330;--bg4:#262c3a;
  --border:#2a3040;--text:#e4e7ec;--text2:#8b95a8;--text3:#5a6378;
  --accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;
  --orange:#f59e0b;--blue:#3b82f6;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}
a{color:var(--accent2);text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;outline:none;font-size:14px}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}

/* Sidebar */
.sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.logo{padding:20px;font-size:18px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent2)}
.nav{flex:1;padding:12px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text2);font-size:14px;transition:.15s}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{color:var(--accent2);background:var(--bg3);border-right:2px solid var(--accent)}
.nav-icon{width:18px;text-align:center;font-size:16px}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:12px;color:var(--text3)}

/* Main */
.main{margin-left:220px;flex:1;min-height:100vh}
.header{padding:20px 32px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:600}
.header-actions{display:flex;gap:8px;align-items:center}
.content{padding:24px 32px}

/* Cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;margin-bottom:24px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:20px}
.card-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.card-value{font-size:28px;font-weight:700}
.card-sub{font-size:12px;color:var(--text3);margin-top:4px}

/* Tables */
.table-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--bg3)}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(99,102,241,.04)}

/* Badges */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,.15);color:var(--green)}
.badge-red{background:rgba(239,68,68,.15);color:var(--red)}
.badge-orange{background:rgba(245,158,11,.15);color:var(--orange)}
.badge-blue{background:rgba(59,130,246,.15);color:var(--blue)}
.badge-purple{background:rgba(99,102,241,.15);color:var(--accent2)}

/* Buttons */
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:500;border:none;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg3);color:var(--text)}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:24px;width:480px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{font-size:18px;margin-bottom:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{width:100%}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Toast */
.toast-container{position:fixed;top:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:8px;font-size:13px;animation:slideIn .3s;max-width:360px}
.toast-success{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.toast-error{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.3);color:var(--red)}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:none;opacity:1}}

/* Empty state */
.empty{text-align:center;padding:48px;color:var(--text3);font-size:14px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.5}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Device flow */
.device-flow-code{font-size:32px;font-weight:700;letter-spacing:4px;color:var(--accent2);text-align:center;padding:20px;background:var(--bg3);border-radius:10px;margin:16px 0}
.device-flow-url{text-align:center;margin-bottom:16px}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>

<nav class="sidebar">
  <div class="logo">⚡ <span>AntiGateway</span></div>
  <div class="nav">
    <a class="nav-item active" data-page="dashboard"><span class="nav-icon">📊</span> 仪表盘</a>
    <a class="nav-item" data-page="providers"><span class="nav-icon">🔌</span> Provider</a>
    <a class="nav-item" data-page="keys"><span class="nav-icon">🔑</span> API Keys</a>
    <a class="nav-item" data-page="usage"><span class="nav-icon">📈</span> 用量统计</a>
    <a class="nav-item" data-page="copilot"><span class="nav-icon">🤖</span> Copilot</a>
    <a class="nav-item" data-page="kiro"><span class="nav-icon">☁️</span> Kiro</a>
  </div>
  <div class="sidebar-footer">AntiGateway Admin Panel</div>
</nav>

<div class="main">
  <div class="header">
    <h1 id="page-title">仪表盘</h1>
    <div class="header-actions" id="header-actions"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal"></div>
</div>

<div class="toast-container" id="toast-container"></div>

<script>
// ============================================================
// AntiGateway Admin SPA
// ============================================================
const $ = (s, p) => (p || document).querySelector(s);
const $$ = (s, p) => [...(p || document).querySelectorAll(s)];

// State
let adminKey = localStorage.getItem('ag_admin_key') || '';
const API = '';

// ---- API helpers ----
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (adminKey) opts.headers['Authorization'] = 'Bearer ' + adminKey;
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: res.statusText }));
    throw new Error(err.error?.message || err.error || `HTTP ${res.status}`);
  }
  return res.json();
}

// ---- Toast ----
function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  $('#toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}

// ---- Modal ----
function openModal(html) {
  $('#modal').innerHTML = html;
  $('#modal-overlay').classList.add('show');
}
function closeModal() {
  $('#modal-overlay').classList.remove('show');
}
$('#modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ---- Navigation ----
const pages = {};
let currentPage = 'dashboard';

function navigate(page) {
  currentPage = page;
  $$('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  const titles = { dashboard: '仪表盘', providers: 'Provider 管理', keys: 'API Keys', usage: '用量统计', copilot: 'Copilot 管理', kiro: 'Kiro 管理' };
  $('#page-title').textContent = titles[page] || page;
  $('#header-actions').innerHTML = '';
  if (pages[page]) pages[page]();
}

$$('.nav-item').forEach(n => n.addEventListener('click', () => navigate(n.dataset.page)));

// ============================================================
// Dashboard
// ============================================================
pages.dashboard = async () => {
  const content = $('#content');
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const [info, health, provData] = await Promise.all([
      fetch(API + '/').then(r => r.json()),
      fetch(API + '/health').then(r => r.json()),
      api('GET', '/admin/providers').catch(() => null),
    ]);

    const providers = provData?.providers || [];
    const healthyCount = providers.filter(p => p.healthy).length;
    const totalCount = providers.length;

    let keysInfo = '';
    try {
      const kd = await api('GET', '/admin/keys');
      keysInfo = `<div class="card"><div class="card-label">API Keys</div><div class="card-value">${kd.total || 0}</div><div class="card-sub">已激活密钥</div></div>`;
    } catch { keysInfo = ''; }

    content.innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="card-label">版本</div>
          <div class="card-value" style="font-size:22px">${esc(info.version || 'N/A')}</div>
          <div class="card-sub">${esc(info.name || 'AntiGateway')}</div>
        </div>
        <div class="card">
          <div class="card-label">Providers</div>
          <div class="card-value">${healthyCount} / ${totalCount}</div>
          <div class="card-sub">${healthyCount === totalCount ? '✅ 全部健康' : '⚠️ 部分不可用'}</div>
        </div>
        ${keysInfo}
        <div class="card">
          <div class="card-label">端点</div>
          <div class="card-value">${(info.endpoints || []).length}</div>
          <div class="card-sub">已注册路由</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Provider</th><th>健康状态</th></tr></thead>
          <tbody>
            ${providers.map(p => `<tr><td>${esc(p.name)}</td><td>${p.healthy ? '<span class="badge badge-green">Healthy</span>' : '<span class="badge badge-red">Unhealthy</span>'}</td></tr>`).join('')}
            ${providers.length === 0 ? '<tr><td colspan="2" class="empty">无 Provider 数据(需要 admin 鉴权)</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">⚙️</div>
      <p>连接失败或需要配置 Admin Key</p>
      <p style="margin-top:8px;font-size:12px">${esc(e.message)}</p>
      <button class="btn btn-primary" style="margin-top:16px" onclick="showSettingsModal()">设置 Admin Key</button>
    </div>`;
  }
};

// ============================================================
// Providers
// ============================================================
pages.providers = async () => {
  const content = $('#content');
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', '/admin/providers');
    const providers = data.providers || [];
    content.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>名称</th><th>状态</th></tr></thead>
          <tbody>
            ${providers.map(p => `
              <tr>
                <td><strong>${esc(p.name)}</strong></td>
                <td>${p.healthy ? '<span class="badge badge-green">Healthy</span>' : '<span class="badge badge-red">Unhealthy</span>'}</td>
              </tr>
            `).join('')}
            ${providers.length === 0 ? '<tr><td colspan="2" class="empty">无已注册 Provider</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🔌</div><p>${esc(e.message)}</p></div>`;
  }
};

// ============================================================
// API Keys
// ============================================================
pages.keys = async () => {
  const content = $('#content');
  $('#header-actions').innerHTML = '<button class="btn btn-primary" onclick="showCreateKeyModal()">+ 创建 Key</button>';
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', '/admin/keys');
    const keys = data.keys || [];
    content.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>名称</th><th>Key</th><th>状态</th><th>QPM</th><th>TPM</th><th>默认 Provider</th><th>操作</th></tr></thead>
          <tbody>
            ${keys.map(k => `
              <tr>
                <td><strong>${esc(k.name)}</strong></td>
                <td><code style="font-size:12px;color:var(--text3)">${esc(k.key_prefix)}</code></td>
                <td>${k.enabled ? '<span class="badge badge-green">启用</span>' : '<span class="badge badge-red">禁用</span>'}</td>
                <td>${k.qpm || '∞'}</td>
                <td>${k.tpm || '∞'}</td>
                <td>${k.default_provider ? esc(k.default_provider) : '<span style="color:var(--text3)">—</span>'}</td>
                <td>
                  <button class="btn btn-ghost btn-sm" onclick="showEditKeyModal('${esc(k.id)}')">编辑</button>
                  <button class="btn btn-danger btn-sm" onclick="confirmDeleteKey('${esc(k.id)}','${esc(k.name)}')">删除</button>
                </td>
              </tr>
            `).join('')}
            ${keys.length === 0 ? '<tr><td colspan="7" class="empty">暂无 API Key</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🔑</div><p>${esc(e.message)}</p></div>`;
  }
};

function showCreateKeyModal() {
  openModal(`
    <h2>创建 API Key</h2>
    <form id="create-key-form">
      <div class="form-group"><label>名称 *</label><input name="name" required placeholder="e.g. my-app"></div>
      <div class="form-group"><label>QPM (每分钟请求数)</label><input name="qpm" type="number" min="0" placeholder="0 = 不限制"></div>
      <div class="form-group"><label>TPM (每分钟 Token 数)</label><input name="tpm" type="number" min="0" placeholder="0 = 不限制"></div>
      <div class="form-group"><label>默认 Provider</label><input name="default_provider" placeholder="留空使用全局默认"></div>
      <div class="form-group"><label>允许模型 (逗号分隔)</label><input name="allowed_models" placeholder="留空 = 全部模型"></div>
      <div class="form-group"><label>允许 Provider (逗号分隔)</label><input name="allowed_providers" placeholder="留空 = 全部 Provider"></div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">创建</button>
      </div>
    </form>
  `);
  $('#create-key-form').onsubmit = async (e) => {
    e.preventDefault();
    const f = new FormData(e.target);
    const body = { name: f.get('name') };
    if (f.get('qpm')) body.qpm = parseInt(f.get('qpm'));
    if (f.get('tpm')) body.tpm = parseInt(f.get('tpm'));
    if (f.get('default_provider')) body.default_provider = f.get('default_provider');
    if (f.get('allowed_models')) body.allowed_models = f.get('allowed_models').split(',').map(s => s.trim()).filter(Boolean);
    if (f.get('allowed_providers')) body.allowed_providers = f.get('allowed_providers').split(',').map(s => s.trim()).filter(Boolean);
    try {
      const key = await api('POST', '/admin/keys', body);
      closeModal();
      toast('Key 创建成功');
      // Show the full key to user
      openModal(`
        <h2>Key 已创建</h2>
        <p style="margin-bottom:12px;color:var(--text2)">请保存此 Key，之后无法再次查看完整值：</p>
        <div style="background:var(--bg3);padding:12px;border-radius:6px;word-break:break-all;font-family:monospace;font-size:13px">${esc(key.key)}</div>
        <div class="form-actions"><button class="btn btn-primary" onclick="closeModal();pages.keys()">确定</button></div>
      `);
    } catch (err) { toast(err.message, 'error'); }
  };
}

async function showEditKeyModal(id) {
  try {
    const key = await api('GET', '/admin/keys/' + id);
    openModal(`
      <h2>编辑 Key: ${esc(key.name)}</h2>
      <form id="edit-key-form">
        <div class="form-group"><label>名称</label><input name="name" value="${esc(key.name)}"></div>
        <div class="form-group"><label>启用</label><select name="enabled"><option value="true" ${key.enabled ? 'selected' : ''}>是</option><option value="false" ${!key.enabled ? 'selected' : ''}>否</option></select></div>
        <div class="form-group"><label>QPM</label><input name="qpm" type="number" min="0" value="${key.qpm || 0}"></div>
        <div class="form-group"><label>TPM</label><input name="tpm" type="number" min="0" value="${key.tpm || 0}"></div>
        <div class="form-group"><label>默认 Provider</label><input name="default_provider" value="${esc(key.default_provider || '')}"></div>
        <div class="form-group"><label>允许模型</label><input name="allowed_models" value="${(key.allowed_models || []).join(', ')}"></div>
        <div class="form-group"><label>允许 Provider</label><input name="allowed_providers" value="${(key.allowed_providers || []).join(', ')}"></div>
        <div class="form-actions">
          <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    `);
    $('#edit-key-form').onsubmit = async (e) => {
      e.preventDefault();
      const f = new FormData(e.target);
      const body = {
        name: f.get('name') || undefined,
        enabled: f.get('enabled') === 'true',
        qpm: parseInt(f.get('qpm')) || 0,
        tpm: parseInt(f.get('tpm')) || 0,
      };
      if (f.get('default_provider')) body.default_provider = f.get('default_provider');
      const models = f.get('allowed_models');
      body.allowed_models = models ? models.split(',').map(s => s.trim()).filter(Boolean) : [];
      const provs = f.get('allowed_providers');
      body.allowed_providers = provs ? provs.split(',').map(s => s.trim()).filter(Boolean) : [];
      try {
        await api('PUT', '/admin/keys/' + id, body);
        closeModal();
        toast('Key 已更新');
        pages.keys();
      } catch (err) { toast(err.message, 'error'); }
    };
  } catch (err) { toast(err.message, 'error'); }
}

function confirmDeleteKey(id, name) {
  openModal(`
    <h2>确认删除</h2>
    <p style="margin-bottom:16px">确定要删除 Key "<strong>${esc(name)}</strong>" 吗？此操作不可撤销。</p>
    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeModal()">取消</button>
      <button class="btn btn-danger" onclick="doDeleteKey('${esc(id)}')">删除</button>
    </div>
  `);
}

async function doDeleteKey(id) {
  try {
    await api('DELETE', '/admin/keys/' + id);
    closeModal();
    toast('Key 已删除');
    pages.keys();
  } catch (err) { toast(err.message, 'error'); }
}

// ============================================================
// Usage
// ============================================================
pages.usage = async () => {
  const content = $('#content');
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', '/admin/usage');
    const items = data || [];

    if (!Array.isArray(items) || items.length === 0) {
      content.innerHTML = '<div class="empty"><div class="empty-icon">📈</div><p>暂无用量数据</p></div>';
      return;
    }

    content.innerHTML = `
      <div class="table-wrap">
        <table>
          <thead><tr><th>Key ID</th><th>名称</th><th>请求数</th><th>输入 Tokens</th><th>输出 Tokens</th><th>总 Tokens</th></tr></thead>
          <tbody>
            ${items.map(u => `
              <tr>
                <td><code style="font-size:12px">${esc(u.key_id || '')}</code></td>
                <td>${esc(u.key_name || '')}</td>
                <td>${fmtNum(u.total_requests)}</td>
                <td>${fmtNum(u.input_tokens)}</td>
                <td>${fmtNum(u.output_tokens)}</td>
                <td><strong>${fmtNum(u.total_tokens)}</strong></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">📈</div><p>${esc(e.message)}</p></div>`;
  }
};

// ============================================================
// Copilot
// ============================================================
pages.copilot = async () => {
  const content = $('#content');
  $('#header-actions').innerHTML = '<button class="btn btn-primary" onclick="startDeviceFlow()">+ 添加账户</button>';
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', '/admin/copilot/accounts');
    const accounts = data.accounts || [];
    content.innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="card-label">账户总数</div>
          <div class="card-value">${accounts.length}</div>
          <div class="card-sub">Copilot 账户池</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>用户名</th><th>状态</th><th>Token 有效</th><th>上次使用</th></tr></thead>
          <tbody>
            ${accounts.map(a => `
              <tr>
                <td><strong>${esc(a.username || a.login || 'N/A')}</strong></td>
                <td>${a.healthy !== false ? '<span class="badge badge-green">正常</span>' : '<span class="badge badge-red">不可用</span>'}</td>
                <td>${a.has_token ? '<span class="badge badge-green">有效</span>' : '<span class="badge badge-orange">无 Token</span>'}</td>
                <td style="color:var(--text3)">${a.last_used || '—'}</td>
              </tr>
            `).join('')}
            ${accounts.length === 0 ? '<tr><td colspan="4" class="empty">暂无 Copilot 账户，点击右上角添加</td></tr>' : ''}
          </tbody>
        </table>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">🤖</div><p>${esc(e.message)}</p>
      <p style="margin-top:8px;font-size:12px;color:var(--text3)">需要配置 Copilot Provider</p></div>`;
  }
};

let deviceFlowPollTimer = null;

async function startDeviceFlow() {
  try {
    const session = await api('POST', '/admin/auth/device-code');
    openModal(`
      <h2>GitHub 设备授权</h2>
      <p style="color:var(--text2);margin-bottom:8px">请在浏览器中打开以下链接并输入授权码：</p>
      <div class="device-flow-url">
        <a href="${esc(session.verification_uri)}" target="_blank" rel="noopener noreferrer">${esc(session.verification_uri)}</a>
      </div>
      <div class="device-flow-code">${esc(session.user_code)}</div>
      <div style="text-align:center;margin-bottom:16px">
        <span class="badge badge-blue" id="device-flow-status">等待授权...</span>
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="cancelDeviceFlow()">取消</button>
        <button class="btn btn-primary" id="device-flow-complete-btn" disabled onclick="completeDeviceFlow('${esc(session.id)}')">添加到池</button>
      </div>
    `);

    // Start polling
    const interval = (session.interval || 5) * 1000;
    if (deviceFlowPollTimer) clearInterval(deviceFlowPollTimer);
    deviceFlowPollTimer = setInterval(async () => {
      try {
        const poll = await api('GET', '/admin/auth/poll/' + session.id);
        const statusEl = $('#device-flow-status');
        const btnEl = $('#device-flow-complete-btn');
        if (!statusEl) { clearInterval(deviceFlowPollTimer); return; }
        if (poll.status === 'completed') {
          statusEl.textContent = '✅ 授权成功';
          statusEl.className = 'badge badge-green';
          if (btnEl) btnEl.disabled = false;
          clearInterval(deviceFlowPollTimer);
        } else if (poll.status === 'error') {
          statusEl.textContent = '❌ ' + (poll.error || '授权失败');
          statusEl.className = 'badge badge-red';
          clearInterval(deviceFlowPollTimer);
        }
      } catch { /* continue polling */ }
    }, interval);
  } catch (e) { toast(e.message, 'error'); }
}

function cancelDeviceFlow() {
  if (deviceFlowPollTimer) clearInterval(deviceFlowPollTimer);
  closeModal();
}

async function completeDeviceFlow(id) {
  try {
    await api('POST', '/admin/auth/complete/' + id);
    if (deviceFlowPollTimer) clearInterval(deviceFlowPollTimer);
    closeModal();
    toast('Copilot 账户已添加');
    pages.copilot();
  } catch (e) { toast(e.message, 'error'); }
}

// ============================================================
// Kiro
// ============================================================
pages.kiro = async () => {
  const content = $('#content');
  $('#header-actions').innerHTML = '<button class="btn btn-primary" onclick="startKiroLogin()">登录 Kiro</button>';
  content.innerHTML = '<div class="spinner"></div>';
  try {
    const data = await api('GET', '/admin/kiro/status');
    const hasLogin = data.has_login;
    const hasCurrent = data.has_current;
    const isExtIDP = data.is_external_idp;
    const expiresAt = data.expires_at;

    let sourceText = '无可用 Token';
    let sourceBadge = 'badge-red';
    if (hasLogin) { sourceText = 'PKCE 登录'; sourceBadge = 'badge-purple'; }

    let statusText = '未就绪';
    let statusBadge = 'badge-red';
    if (hasCurrent) { statusText = '已就绪'; statusBadge = 'badge-green'; }

    let expiresText = '—';
    if (expiresAt) {
      const d = new Date(expiresAt);
      expiresText = d.toLocaleString('zh-CN');
    }

    content.innerHTML = `
      <div class="cards">
        <div class="card">
          <div class="card-label">Token 状态</div>
          <div class="card-value" style="font-size:18px"><span class="badge ${statusBadge}">${statusText}</span></div>
          <div class="card-sub">Kiro Provider</div>
        </div>
        <div class="card">
          <div class="card-label">Token 来源</div>
          <div class="card-value" style="font-size:18px"><span class="badge ${sourceBadge}">${sourceText}</span></div>
          <div class="card-sub">${hasLogin ? '内建 PKCE 登录' : '点击右上角登录'}</div>
        </div>
        <div class="card">
          <div class="card-label">过期时间</div>
          <div class="card-value" style="font-size:16px">${esc(expiresText)}</div>
          <div class="card-sub">Token 有效期</div>
        </div>
      </div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:24px">
        <h3 style="font-size:16px;margin-bottom:12px">使用说明</h3>
        <ul style="color:var(--text2);font-size:14px;line-height:2;padding-left:20px">
          <li><strong>PKCE 登录</strong>：点击右上角「登录 Kiro」按钮，在弹出的浏览器页面中完成 Kiro 账号登录（支持 Google、GitHub、Email、企业 SSO 等方式）</li>
          <li>Token 会自动刷新，无需手动操作</li>
        </ul>
      </div>
    `;
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">☁️</div><p>${esc(e.message)}</p>
      <p style="margin-top:8px;font-size:12px;color:var(--text3)">需要配置 Kiro Provider</p></div>`;
  }
};

let kiroLoginPollTimer = null;

async function startKiroLogin() {
  try {
    const session = await api('POST', '/admin/kiro/login');
    // Open the Kiro login page in a new browser tab
    window.open(session.auth_url, '_blank');

    openModal(`
      <h2>Kiro 登录</h2>
      <p style="color:var(--text2);margin-bottom:8px">已在新标签页中打开 Kiro 登录页面，请在浏览器中完成登录：</p>
      <div style="text-align:center;margin:16px 0">
        <a href="${esc(session.auth_url)}" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" style="font-size:13px">🔗 重新打开登录页</a>
      </div>
      <div style="text-align:center;margin-bottom:16px">
        <span class="badge badge-blue" id="kiro-login-status">等待登录...</span>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text3);margin-bottom:16px">
        支持 Google、GitHub、Email、企业 SSO 等登录方式
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" onclick="cancelKiroLogin()">取消</button>
      </div>
    `);

    // Poll login status
    if (kiroLoginPollTimer) clearInterval(kiroLoginPollTimer);
    kiroLoginPollTimer = setInterval(async () => {
      try {
        const poll = await api('GET', '/admin/kiro/login/' + session.id);
        const statusEl = $('#kiro-login-status');
        if (!statusEl) { clearInterval(kiroLoginPollTimer); return; }
        if (poll.status === 'completed') {
          statusEl.textContent = '✅ 登录成功，正在保存...';
          statusEl.className = 'badge badge-green';
          clearInterval(kiroLoginPollTimer);
          // Auto-complete: save token to provider
          try {
            await api('POST', '/admin/kiro/login/complete/' + session.id);
            closeModal();
            toast('Kiro 登录成功');
            pages.kiro();
          } catch (e2) {
            statusEl.textContent = '❌ 保存失败: ' + (e2.message || '未知错误');
            statusEl.className = 'badge badge-red';
          }
        } else if (poll.status === 'error') {
          statusEl.textContent = '❌ ' + (poll.error || '登录失败');
          statusEl.className = 'badge badge-red';
          clearInterval(kiroLoginPollTimer);
        }
      } catch { /* continue polling */ }
    }, 2000);
  } catch (e) { toast(e.message, 'error'); }
}

function cancelKiroLogin() {
  if (kiroLoginPollTimer) clearInterval(kiroLoginPollTimer);
  closeModal();
}

// Settings Modal
// ============================================================
function showSettingsModal() {
  openModal(`
    <h2>设置</h2>
    <form id="settings-form">
      <div class="form-group">
        <label>Admin Key</label>
        <input name="admin_key" type="password" value="${esc(adminKey)}" placeholder="输入 Admin API Key">
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  `);
  $('#settings-form').onsubmit = (e) => {
    e.preventDefault();
    adminKey = new FormData(e.target).get('admin_key');
    localStorage.setItem('ag_admin_key', adminKey);
    closeModal();
    toast('Admin Key 已保存');
    navigate(currentPage);
  };
}

// ---- Settings button in header ----
document.addEventListener('DOMContentLoaded', () => {
  const settingsBtn = document.createElement('button');

  $('.header-actions').appendChild(settingsBtn);
});

function fmtNum(n) { return (n || 0).toLocaleString(); }

// ---- Init ----
navigate('dashboard');
